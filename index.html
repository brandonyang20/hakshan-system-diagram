// ── HELPERS ──
function nodeMap() {
  const m = {};
  NODES.forEach(n => m[n.id] = n);
  return m;
}
const NM = nodeMap();

// Get the centre point of a node
function centre(id) {
  const n = NM[id];
  if (!n) return null;
  return { x: n.x + n.w/2, y: n.y + n.h/2 };
}

// Get the best edge point on a node toward a target point
function edgePt(id, tx, ty) {
  const n = NM[id];
  if (!n) return null;
  const cx = n.x + n.w/2;
  const cy = n.y + n.h/2;
  const dx = tx - cx;
  const dy = ty - cy;
  if (Math.abs(dy) >= Math.abs(dx)) {
    // top or bottom
    const ex = cx + dx * ((n.h/2) / Math.abs(dy));
    return dy > 0
      ? { x: Math.max(n.x+6, Math.min(n.x+n.w-6, ex)), y: n.y + n.h }
      : { x: Math.max(n.x+6, Math.min(n.x+n.w-6, ex)), y: n.y };
  } else {
    // left or right
    const ey = cy + dy * ((n.w/2) / Math.abs(dx));
    return dx > 0
      ? { x: n.x + n.w, y: Math.max(n.y+6, Math.min(n.y+n.h-6, ey)) }
      : { x: n.x,       y: Math.max(n.y+6, Math.min(n.y+n.h-6, ey)) };
  }
}

// Draw orthogonal dashed line with arrowhead
// Uses explicit bottom-centre of source → top-centre of target when nodes are vertically arranged
// Uses side edges when nodes are horizontally arranged
// Adds a small horizontal offset to avoid lines stacking on each other
function drawOrthoLink(fromId, toId, color, offsetX) {
  const fn = NM[fromId], tn = NM[toId];
  if (!fn || !tn) return;

  const ox = offsetX || 0; // horizontal stagger to separate parallel lines

  const fcx = fn.x + fn.w/2 + ox;
  const fcy_bot = fn.y + fn.h;       // bottom of source
  const fcy_top = fn.y;              // top of source
  const tcx = tn.x + tn.w/2 + ox;
  const tcy_top = tn.y;              // top of target
  const tcy_bot = tn.y + tn.h;      // bottom of target

  const fcy_mid = fn.y + fn.h/2;
  const tcy_mid = tn.y + tn.h/2;

  // Determine layout: above/below or side by side
  const vertGap   = tn.y - (fn.y + fn.h);   // positive if target is below source
  const horizGap  = tn.x - (fn.x + fn.w);   // positive if target is to the right

  let pts;

  if (vertGap >= -20) {
    // Target is below (or slightly overlapping) — exit bottom, enter top
    const fy = fcy_bot;
    const ty = tcy_top;
    const midY = fy + (ty - fy) * 0.5;
    const fx = Math.max(fn.x + 8, Math.min(fn.x + fn.w - 8, fcx));
    const tx = Math.max(tn.x + 8, Math.min(tn.x + tn.w - 8, tcx));

    if (Math.abs(fx - tx) < 6) {
      // nearly aligned — straight down
      pts = [{x:fx, y:fy}, {x:tx, y:ty}];
    } else {
      // L-shape via midY
      pts = [{x:fx, y:fy}, {x:fx, y:midY}, {x:tx, y:midY}, {x:tx, y:ty}];
    }
  } else if (horizGap >= -20) {
    // Target is to the right — exit right edge, enter left edge
    const fx = fn.x + fn.w;
    const tx = tn.x;
    const fy = Math.max(fn.y + 8, Math.min(fn.y + fn.h - 8, fcy_mid + ox));
    const ty = Math.max(tn.y + 8, Math.min(tn.y + tn.h - 8, tcy_mid + ox));
    const midX = fx + (tx - fx) * 0.5;
    if (Math.abs(fy - ty) < 6) {
      pts = [{x:fx, y:fy}, {x:tx, y:ty}];
    } else {
      pts = [{x:fx, y:fy}, {x:midX, y:fy}, {x:midX, y:ty}, {x:tx, y:ty}];
    }
  } else if (fn.x + fn.w <= tn.x + 20) {
    // Source is to the left of target — right→left
    const fx = fn.x + fn.w;
    const tx = tn.x;
    const fy = fcy_mid + ox;
    const ty = tcy_mid + ox;
    const midX = fx + (tx - fx) * 0.5;
    pts = [{x:fx, y:fy}, {x:midX, y:fy}, {x:midX, y:ty}, {x:tx, y:ty}];
  } else {
    // fallback: bottom → top with mid routing
    const fy = fcy_bot;
    const ty = tcy_top;
    const midY = fy + (ty - fy) * 0.5;
    const fx = Math.max(fn.x + 8, Math.min(fn.x + fn.w - 8, fcx));
    const tx = Math.max(tn.x + 8, Math.min(tn.x + tn.w - 8, tcx));
    pts = [{x:fx, y:fy}, {x:fx, y:midY}, {x:tx, y:midY}, {x:tx, y:ty}];
  }

  // Clamp all points inside canvas width
  pts = pts.map(p => ({x: Math.max(8, Math.min(PW-8, p.x)), y: p.y}));

  ctx.save();
  ctx.setLineDash([5, 4]);
  ctx.strokeStyle = color;
  ctx.lineWidth = 1.5;
  ctx.globalAlpha = 0.65;
  ctx.beginPath();
  ctx.moveTo(pts[0].x, pts[0].y);
  for (let i = 1; i < pts.length; i++) ctx.lineTo(pts[i].x, pts[i].y);
  ctx.stroke();

  // arrowhead at target end
  const last  = pts[pts.length-1];
  const prev  = pts[pts.length-2];
  const angle = Math.atan2(last.y - prev.y, last.x - prev.x);
  const al = 9, aw = 0.42;
  ctx.setLineDash([]);
  ctx.beginPath();
  ctx.moveTo(last.x, last.y);
  ctx.lineTo(last.x - al*Math.cos(angle - aw), last.y - al*Math.sin(angle - aw));
  ctx.lineTo(last.x - al*Math.cos(angle + aw), last.y - al*Math.sin(angle + aw));
  ctx.closePath();
  ctx.fillStyle = color;
  ctx.globalAlpha = 0.8;
  ctx.fill();
  ctx.restore();
}

// ── DRAW NODE ──
function rr(x,y,w,h,r) {
  ctx.beginPath();
  ctx.moveTo(x+r,y);ctx.lineTo(x+w-r,y);ctx.quadraticCurveTo(x+w,y,x+w,y+r);
  ctx.lineTo(x+w,y+h-r);ctx.quadraticCurveTo(x+w,y+h,x+w-r,y+h);
  ctx.lineTo(x+r,y+h);ctx.quadraticCurveTo(x,y+h,x,y+h-r);
  ctx.lineTo(x,y+r);ctx.quadraticCurveTo(x,y,x+r,y);ctx.closePath();
}

function drawNode(n) {
  const th = TH[n.theme] || TH.gray;

  // shadow
  ctx.save();
  ctx.shadowColor='rgba(0,0,0,0.55)';ctx.shadowBlur=14;ctx.shadowOffsetY=5;
  rr(n.x,n.y,n.w,n.h,10);ctx.fillStyle=th.fill;ctx.fill();
  ctx.restore();

  // border
  rr(n.x,n.y,n.w,n.h,10);
  ctx.strokeStyle = th.stroke;
  ctx.lineWidth = 1.5;
  if (n.dashed) { ctx.setLineDash([5,3]); }
  ctx.stroke();
  ctx.setLineDash([]);

  const P  = 13;
  const IW = n.w - P*2;

  // sub
  if (n.sub) {
    ctx.font=`400 9px '${MONO}'`;ctx.fillStyle=MUTED;ctx.textAlign='left';
    let s=n.sub; while(ctx.measureText(s).width>IW&&s.length>4) s=s.slice(0,-1);
    if(s!==n.sub) s+='…';
    ctx.fillText(s,n.x+P,n.y+16);
  }

  // title
  ctx.font=`500 13px '${SANS}'`;ctx.fillStyle=th.title;ctx.textAlign='left';
  const ty0 = n.sub ? n.y+31 : n.y+18;
  const words = n.label.split(' ');
  let line='', ly=ty0;
  for(const w of words){
    const test=line?line+' '+w:w;
    if(ctx.measureText(test).width>IW&&line){
      ctx.fillText(line,n.x+P,ly);ly+=16;line=w;
    } else line=test;
  }
  if(line){ ctx.fillText(line,n.x+P,ly); ly+=16; }

  // divider
  ctx.beginPath();ctx.moveTo(n.x+P,ly+2);ctx.lineTo(n.x+n.w-P,ly+2);
  ctx.strokeStyle='rgba(255,255,255,0.05)';ctx.lineWidth=1;ctx.stroke();

  // bullets
  if(n.bullets){
    ctx.font=`400 10px '${SANS}'`;
    let by=ly+16;
    for(const b of n.bullets){
      if(by+13>n.y+n.h-4) break;
      ctx.beginPath();ctx.arc(n.x+P+3,by-3,2,0,Math.PI*2);
      ctx.fillStyle=th.dot;ctx.fill();
      ctx.fillStyle='#7a97b8';
      let txt=b;
      while(ctx.measureText(txt).width>IW-14&&txt.length>3) txt=txt.slice(0,-1);
      if(txt!==b) txt+='…';
      ctx.fillText(txt,n.x+P+12,by);
      by+=14;
    }
  }
}

// ── DRAW SECTION LABELS ──
function drawSections() {
  SECTIONS.forEach(s=>{
    ctx.font=`500 9px '${MONO}'`;ctx.fillStyle=MUTED;ctx.textAlign='left';
    const txt=s.label.toUpperCase();
    ctx.fillText(txt,40,s.y+7);
    const lx=40+ctx.measureText(txt).width+12;
    ctx.beginPath();ctx.moveTo(lx,s.y+3);ctx.lineTo(PW-40,s.y+3);
    ctx.strokeStyle='rgba(42,63,96,0.5)';ctx.lineWidth=1;ctx.stroke();
  });

  DIVIDERS.forEach(d=>{
    ctx.font=`500 9px '${MONO}'`;
    const bw=ctx.measureText(d.label.toUpperCase()).width+28;
    const bx=(PW-bw)/2;
    rr(bx,d.y-11,bw,20,4);
    ctx.fillStyle=d.color+'22';ctx.fill();
    rr(bx,d.y-11,bw,20,4);
    ctx.strokeStyle=d.color+'88';ctx.lineWidth=1;ctx.stroke();
    ctx.fillStyle=d.color;ctx.textAlign='left';
    ctx.fillText(d.label.toUpperCase(),bx+14,d.y+3);
    // lines
    ctx.beginPath();ctx.moveTo(40,d.y);ctx.lineTo(bx-8,d.y);
    ctx.strokeStyle=d.color+'55';ctx.lineWidth=1;ctx.setLineDash([5,3]);ctx.stroke();
    ctx.beginPath();ctx.moveTo(bx+bw+8,d.y);ctx.lineTo(PW-40,d.y);
    ctx.stroke();ctx.setLineDash([]);
  });
}

// ── HEADER ──
function drawHeader() {
  // bg strip
  ctx.fillStyle='rgba(245,158,11,0.07)';ctx.fillRect(0,0,PW,92);
  ctx.strokeStyle='rgba(245,158,11,0.15)';ctx.lineWidth=1;
  ctx.beginPath();ctx.moveTo(0,92);ctx.lineTo(PW,92);ctx.stroke();

  ctx.font=`600 20px '${SANS}'`;ctx.fillStyle=TEXT;ctx.textAlign='left';
  ctx.fillText('HakShan — Full System Architecture',40,32);
  ctx.font=`400 9px '${MONO}'`;ctx.fillStyle=MUTED;
  ctx.fillText('CENTRAL KITCHEN (HOLDING CO)  ·  8 OUTLET SDN BHDS  ·  n8n AUTOMATION PIPELINE  ·  v5.0  ·  MAR 2026',40,50);

  // legend
  const legend=[
    {c:'#f59e0b',l:'Suppliers / WA'},{c:'#14b8a6',l:'CK / Teal'},{c:'#8b5cf6',l:'Outlet Sdn Bhds'},
    {c:'#f59e0b',l:'n8n Engine'},{c:'#3b82f6',l:'Data Inputs'},{c:'#22c55e',l:'Price Intelligence'},
    {c:'#f97316',l:'Phase 1 Outputs'},{c:'#ec4899',l:'Phase 2 / AI'},
  ];
  let lx=40;
  ctx.font=`400 9px '${SANS}'`;
  legend.forEach(it=>{
    ctx.beginPath();ctx.arc(lx+4,72,4,0,Math.PI*2);ctx.fillStyle=it.c;ctx.fill();
    ctx.fillStyle=MUTED;ctx.textAlign='left';ctx.fillText(it.l,lx+12,76);
    lx+=ctx.measureText(it.l).width+26;
  });
}

// ── FOOTER ──
function drawFooter(h){
  ctx.font=`400 9px '${MONO}'`;ctx.fillStyle='rgba(90,117,153,0.3)';ctx.textAlign='center';
  ctx.fillText('HAKSHAN SYSTEM ARCHITECTURE v5.0  ·  MAR 2026  ·  WEJUMP DIGITAL',PW/2,h-18);
}

// ── RENDER ──
function render() {
  let maxY=0;
  NODES.forEach(n=>{ if(n.y+n.h>maxY) maxY=n.y+n.h; });
  const TH_CANVAS = maxY+80;

  const dpr=window.devicePixelRatio||1;
  CV.width=PW*dpr; CV.height=TH_CANVAS*dpr;
  CV.style.width=PW+'px'; CV.style.height=TH_CANVAS+'px';
  ctx.scale(dpr,dpr);

  // background
  ctx.fillStyle=BG; ctx.fillRect(0,0,PW,TH_CANVAS);

  drawHeader();
  drawSections();

  // ── DRAW LINES FIRST (behind cards) ──
  LINKS.forEach(lk => drawOrthoLink(lk.f, lk.t, lk.c, lk.o || 0));

  // ── DRAW NODES ON TOP ──
  NODES.forEach(drawNode);

  drawFooter(TH_CANVAS);
}

window.addEventListener('load', ()=>setTimeout(render, 200));
window.addEventListener('resize', render);
</script>
</body>
